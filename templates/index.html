<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebScanner - Web指纹识别与资产探测工具</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>WebScanner</h1>
            <p class="subtitle">Web指纹识别与资产探测工具</p>
            <p class="disclaimer">仅用于授权测试，禁止非法使用</p>
        </header>

        <main>
            <!-- 扫描配置 -->
            <div class="scan-section">
                <h2>扫描配置</h2>
                <div class="config-form">
                    <div class="form-group">
                        <label for="targetInput">目标域名或IP</label>
                        <input type="text" id="targetInput" placeholder="输入域名或IP地址 (例如: example.com 或 192.168.1.1)">
                    </div>
                    
                    <div class="form-group">
                        <label>扫描类型</label>
                        <div class="radio-group">
                            <label><input type="radio" name="scanType" value="full" checked> 全面扫描</label>
                            <label><input type="radio" name="scanType" value="quick"> 快速扫描</label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="portRange">端口范围</label>
                        <input type="text" id="portRange" value="1-1000" placeholder="例如: 1-1000 或 80,443,8080">
                    </div>
                    
                    <div class="form-group">
                        <label for="scanStrategy">扫描策略</label>
                        <select id="scanStrategy">
                            <option value="tcp">TCP 连接扫描</option>
                            <option value="syn">SYN 扫描</option>
                            <option value="udp">UDP 扫描</option>
                        </select>
                    </div>
                    
                    <div class="button-group">
                        <button id="startScanBtn" class="btn btn-primary">开始扫描</button>
                        <button id="stopScanBtn" class="btn btn-danger hidden">停止扫描</button>
                    </div>
                </div>
                
                <!-- 扫描进度 -->
                <div id="progressContainer" class="progress-container hidden">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 0%"></div>
                    </div>
                    <div class="progress-text">准备中...</div>
                </div>
            </div>

            <!-- 标签页 -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="result">扫描结果</button>
                <button class="tab-btn" data-tab="history">历史记录</button>
            </div>

            <!-- 扫描结果 -->
            <div id="resultSection" class="tab-content active">
                <div class="result-header">
                    <h2>扫描结果</h2>
                    <span id="scanTime"></span>
                </div>

                <div class="result-grid">
                    <div class="result-card">
                        <h3>基本信息</h3>
                        <div class="info-item">
                            <span class="label">目标:</span>
                            <span id="targetInfo"></span>
                        </div>
                        <div class="info-item">
                            <span class="label">IP地址:</span>
                            <span id="ipInfo"></span>
                        </div>
                        <div class="info-item">
                            <span class="label">URL:</span>
                            <span id="urlInfo"></span>
                        </div>
                        <div class="info-item">
                            <span class="label">状态码:</span>
                            <span id="statusCode" class="status-code"></span>
                        </div>
                        <div class="info-item">
                            <span class="label">安全防护:</span>
                            <span id="wafInfo"></span>
                        </div>
                    </div>

                    <div class="result-card">
                        <h3>服务器信息</h3>
                        <div id="serverInfo" class="tag-container"></div>
                    </div>

                    <div class="result-card">
                        <h3>CMS框架</h3>
                        <div id="cmsInfo" class="tag-container"></div>
                    </div>

                    <div class="result-card">
                        <h3>编程语言</h3>
                        <div id="languageInfo" class="tag-container"></div>
                    </div>

                    <div class="result-card">
                        <h3>中间件</h3>
                        <div id="middlewareInfo" class="tag-container"></div>
                    </div>

                    <div class="result-card">
                        <h3>开放端口</h3>
                        <div id="portsInfo" class="port-list"></div>
                        <canvas id="portChart" class="port-chart"></canvas>
                    </div>

                    <div class="result-card">
                        <h3>子域名</h3>
                        <div id="subdomainsInfo" class="subdomain-list"></div>
                    </div>

                    <div class="result-card">
                        <h3>CDN 信息</h3>
                        <div id="cdnInfo" class="tag-container"></div>
                    </div>

                    <div class="result-card">
                        <h3>漏洞信息</h3>
                        <div id="vulnerabilitiesInfo" class="vulnerability-list"></div>
                    </div>

                    <div class="result-card full-width">
                        <h3>WHOIS 信息</h3>
                        <div id="whoisInfo" class="whois-list"></div>
                    </div>

                    <div class="result-card full-width">
                        <h3>敏感目录</h3>
                        <div id="sensitivePaths" class="path-list"></div>
                    </div>
                </div>
                
                <div class="export-buttons">
                    <button id="exportPdfBtn" class="btn">导出 PDF 报告</button>
                    <button id="exportJsonBtn" class="btn">导出 JSON 报告</button>
                    <button id="exportCsvBtn" class="btn">导出 CSV 报告</button>
                    <button id="exportHtmlBtn" class="btn">导出 HTML 报告</button>
                </div>
            </div>

            <!-- 历史记录 -->
            <div id="historySection" class="tab-content hidden">
                <h2>历史记录</h2>
                <div id="historyContent"></div>
            </div>

            <!-- 错误信息 -->
            <div id="errorSection" class="error-section hidden">
                <div class="error-message">
                    <h3>扫描失败</h3>
                    <p id="errorMessage"></p>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 WebScanner. 仅供学习和研究使用。</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
